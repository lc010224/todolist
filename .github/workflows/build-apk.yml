name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build - ${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag info
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "BUILD_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Get branch info
        if: startsWith(github.ref, 'refs/heads/')
        run: echo "BUILD_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Display build info
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ env.BUILD_BRANCH || 'N/A' }}"
          echo "Tag: ${{ env.BUILD_TAG || 'N/A' }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "Android platform may already exist"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: List APK files
        run: find android -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: todo-app-apk-${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
