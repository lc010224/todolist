name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build - ${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag info
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "BUILD_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Get branch info
        if: startsWith(github.ref, 'refs/heads/')
        run: echo "BUILD_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Display build info
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ env.BUILD_BRANCH || 'N/A' }}"
          echo "Tag: ${{ env.BUILD_TAG || 'N/A' }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "Android platform may already exist"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate or restore signing key
        id: keystore
        run: |
          KEYSTORE_FILE="android/app/release.keystore"
          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"

          if [ -n "$KEYSTORE_B64" ]; then
            echo "Restoring existing keystore from secret..."
            echo "$KEYSTORE_B64" | base64 -d > "$KEYSTORE_FILE"
            echo "keystore_restored=true" >> $GITHUB_OUTPUT
          else
            echo "Generating new keystore..."
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore "$KEYSTORE_FILE" \
              -alias release \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass todolist123 \
              -keypass todolist123 \
              -dname "CN=todo-app, OU=todo, O=todo, L=beijing, ST=beijing, C=CN"
            echo "keystore_restored=false" >> $GITHUB_OUTPUT
            echo "new_keystore_generated=true" >> $GITHUB_OUTPUT
          fi

      - name: Show new keystore (first time only)
        if: steps.keystore.outputs.new_keystore_generated == 'true'
        run: |
          echo "==================================================================="
          echo "NEW KEYSTORE GENERATED! Please add this secret to GitHub:"
          echo "==================================================================="
          KEYSTORE_B64=$(base64 -w 0 android/app/release.keystore)
          echo ""
          echo "Secret name: KEYSTORE_BASE64"
          echo "Secret value:"
          echo "$KEYSTORE_B64"
          echo ""
          echo "==================================================================="
          echo "Add this in: GitHub > Settings > Secrets > Actions > New secret"
          echo "==================================================================="
          echo "keystore_base64::$KEYSTORE_B64"

      - name: Configure signing
        if: steps.keystore.outputs.keystore_restored == 'true' || steps.keystore.outputs.new_keystore_generated == 'true'
        run: |
          cat >> android/gradle.properties << EOF
          KEYSTORE_PATH=app/release.keystore
          KEYSTORE_PASSWORD=todolist123
          KEY_ALIAS=release
          KEY_PASSWORD=todolist123
          EOF

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: List APK files
        run: find android -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: todo-app-apk-${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
